<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DestiFinder - Login</title>
        <link rel="stylesheet" href="login.css">
    </head>
    <body>
        <!-- Logo and Website Name -->
        <div class="logo-container">
            <img src="https://png.pngtree.com/png-vector/20240120/ourmid/pngtree-initial-df-letter-logo-with-creative-modern-business-typography-vector-png-image_11475925.png" alt="DestiFinder Logo" class="logo">
            <span class="site-name">DestiFinder</span>
        </div>

        <!-- Welcome Back Message -->
        <p class="welcome-message">Welcome back! Please log in to continue.</p>

        <div class="login-container">
            <form id="loginForm">
                <label for="userName">Username:</label>
                <input type="text" id="userName" name="userName" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <button type="button" id="putJsonButton">Sign In</button>

                <!-- Links for account and password -->
                <div class="link-container">
                    <a href="#" class="link">Don't have an account?</a>
                </div>
            </form>
            <!-- Error message that will be shown if login fails -->
            <p id="error-message">Incorrect user name or password. Please try again.</p>
        </div>

        <script src="retrieve.js"></script>
        <script src="submit.js"></script>

        <script>
	
            async function submitData(event) {
              event.preventDefault(); // Prevent default form submission
            
              try {
                // Fetch existing data
                const data = await getJSONData();
                const existingData = JSON.parse(data);
                
                var validUser = false;
                
                var inputUser = document.getElementById("userName").value;
                var inputPassword = document.getElementById("password").value;
                
                const user = existingData.find(user => user.email === inputUser || user.userName === inputUser && user.password === inputPassword);
                
                if (user){
                    validUser = true;
                    sessionStorage.setItem("currUserNm", inputUser);
                    window.location.href = 'homepage.html';
                } else {
                    throw new Error("Invalid Username or Password");
                }
                } catch (error) {
                    console.error("Error:", error);
                    document.getElementById("error-message").style.borderBlockColor = 'maroon';
                    document.getElementById("error-message").style.backgroundColor = 'rgb(222, 120, 120)';
                    document.getElementById("error-message").style.display = 'block';
                    document.getElementById("error-message").innerText = error.message;
                }
            }
            
            document.getElementById("putJsonButton").addEventListener("click", submitData);
        
          </script>
    </body>
</html>
