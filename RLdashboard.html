<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DestiFinder User Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sliderStyles.css">
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body class="bodyStyling">
    <div class="container">
        <!-- CREATE POST MODAL -->
        <div class="modal fade" id="newMarkerModal" role="dialog">
            <div class="modal-dialog">
                <!-- Modal content-->
                <div class="modal-content">
                    <form id="newMarkerForm">
                        <div class="modal-header">
                            <button type="button" class="close" data-dismiss="modal">&times;</button>
                            <input type="text" id="newMarkerTitle" placeholder="New Post" class="modal-title">
                        </div>
                        <div class="modal-body">
                            <label for="newMarkerLoc" required>Location:</label>
                            <input type="text" id="newMarkerLoc" placeholder="*" class="form-control mb-2" required>
                            <label for="newMarkerPics">Select Photos:</label>
                            <!-- Container that holds image previews -->
                            <div id="new_previewContainer"></div>
                            <div class="markerFileInputCont">
                                <input type="file" id="newMarkerPics" name="newMarkerPics" accept="image/*" multiple required><br><br>

                            <label for="newMarkerDesc">Description:</label>
                            <textarea id="newMarkerDesc" name="newMarkerDesc" placeholder="(...)" class="form-control mb-2" rows="4" cols="50" required></textarea>
                            <label for="ratingContainer">Rating:</label>
                            <div class="star-rating">
                                <input type="radio" id="star5" name="rating" value="5">
                                <label for="star5">★</label>
                                <input type="radio" id="star4" name="rating" value="4">
                                <label for="star4">★</label>
                                <input type="radio" id="star3" name="rating" value="3">
                                <label for="star3">★</label>
                                <input type="radio" id="star2" name="rating" value="2">
                                <label for="star2">★</label>
                                <input type="radio" id="star1" name="rating" value="1">
                                <label for="star1">★</label>
                            </div>
                            <input type="hidden" id="selectedRating" name="selectedRating" value="0">
                            <div id="commentsToggleContainer">
                                <label>Comments:</label>
                                <label class="switch">
                                    <input type="checkbox" name="newMarkerComments" checked>
                                    <span class="slider round"></span>
                                </label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button id="postNewMarker" class="btn btn-success w-100">Post Destination</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- EDIT POST MODAL -->
        <div class="modal fade" id="updateMarkerModal" role="dialog">
            <div class="modal-dialog">
                <!-- Modal content-->
                <div class="modal-content">
                    <form id="updateMarkerForm">
                        <div class="modal-header">
                            <button type="button" class="close" data-dismiss="modal">&times;</button>
                            <input type="text" id="updateMarkerTitle" placeholder="New Post" class="modal-title">
                        </div>
                        <div class="modal-body" style="overflow-y: auto;">
                            <label for="updateMarkerLoc" required>Location:</label>
                            <input type="text" id="updateMarkerLoc" placeholder="*" class="form-control mb-2" required>
                            <label for="updateMarkerPics">Select Photos:</label>
                            <!-- Container that holds image previews -->
                            <div id="update_previewContainer"></div>
                            <div class="markerFileInputCont">
                                <input type="file" id="updateMarkerPics" name="updateMarkerPics" accept="image/*" multiple>
                            </div> 

                            <label for="updateMarkerDesc">Description:</label>
                            <textarea id="updateMarkerDesc" name="updateMarkerDesc" placeholder="(...)" class="form-control mb-2" rows="4" cols="50" required></textarea>
                            <label for="ratingContainer">Rating:</label>
                            <div id="ratingContainer" class="star-rating" data-rating="0">
                                <input type="radio" id="star5" name="rating" value="5">
                                <label for="star5">&#9733;</label>
                                <input type="radio" id="star4" name="rating" value="4">
                                <label for="star4">&#9733;</label>
                                <input type="radio" id="star3" name="rating" value="3">
                                <label for="star3">&#9733;</label>
                                <input type="radio" id="star2" name="rating" value="2">
                                <label for="star2">&#9733;</label>
                                <input type="radio" id="star1" name="rating" value="1">
                                <label for="star1">&#9733;</label>
                            </div>
                            <input type="hidden" id="selectedRating" name="selectedRating" value="0">
                            <div id="commentsToggleContainer">
                                <label>Comments:</label>
                                <label class="switch">
                                    <input type="checkbox" name="updateMarkerComments" checked>
                                    <span class="slider round"></span>
                                </label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button id="updateMarker" class="btn btn-success w-100">Update Destination</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- DISPLAY POST MODAL -->
        <div class="modal fade" id="detailsMarkerModal" role="dialog">
            <div class="modal-dialog">
                <!-- Modal content-->
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                        <h1 id="markerTitle">Unnamed Post</h1>
                    </div>
                    <div class="modal-body">
                        <h3>Location:</h3>
                        <p id="markerLoc"></p><br>
                        <p id="markerGeoLoc"></p><br><br>
                        <h3>Photos:</h3>
                        <div class="carousel">
                            <div id="pictureContainer"></div><br>
                        </div>
                        <h3>Description:</h3>
                        <p id="markerDesc"></p><br><br>
                        <h3>Rating:</h3>
                        <p id="markerRating"></p><br><br>
                        <h3>Comments:</h3>
                        <div id="commentContainer"></div>
                        <div id="newCommentContainer">
                            <div id="replyContainer">
                                <p id="newReply"></p>
                                <button type="button" id="cancelReply" class="close" style="display: none">&times;</button>
                            </div>
                            <textarea id="newComment" name="newMarkerDesc" placeholder="..." class="form-control mb-2" rows="1" cols="15" wrap="soft" oninput="
                                this.value != '' ? document.getElementById('newCommentPost').disabled = false : document.getElementById('newCommentPost').disabled = true;
                                this.style.height = 'auto';
                                if (this.scrollHeight <= 64) {
                                    this.style.overflowY = 'hidden';
                                    this.style.height = this.scrollHeight + 'px';
                                } else {
                                    this.style.overflowY = 'auto';
                                    this.style.height = 64 + 'px';
                                }
                            "></textarea>
                            <button id="newCommentPost" class="btn btn-primary" disabled>Post Comment</button>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="deleteMarker" class="btn btn-danger" style="display: none">Delete Post</button>
                        <button id="editMarker" class="btn btn-success w-100" style="display: none">Edit Post</button>
                        <button id="favMarker" class="btn btn-warning">Favorite Post</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal" id="modal-loading" data-backdrop="static">
            <div class="modal-dialog modal-sm">
                <div class="modal-content">
                    <div class="modal-body text-center">
                        <div class="loading-spinner mb-2"></div>
                        <div>Please Wait..</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="retrieve.js"></script>
    <script src="submit.js"></script>
    <script src="RLmapFuncs.js"></script>

    <!-- Navigation Bar -->
    <nav class="navBar">
        <div class="logo-container">
            <img 
                src="https://png.pngtree.com/png-vector/20240120/ourmid/pngtree-initial-df-letter-logo-with-creative-modern-business-typography-vector-png-image_11475925.png" 
                alt="DestiFinder Logo" 
                class="logo" 
                width="40" 
                height="40"
            />
            <span class="site-name">DestiFinder</span>
        </div>
        <ul>
            <li><a href="homepage.html">Home</a></li>
            <li><a href="dashboard.html">Profile</a></li>
            <li><a href="#" id="logOut">Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Search Section -->
        <section id="search">
            <div id="searchContainer">
                <h4>Search by City, Zip, or Location:</h4>
            </div>
        </section>

        <!-- Map Section -->
        <section id="map"></section>

        <!-- Saved Locations List -->
        <section class="saved-locations">
            <h2>Saved Locations</h2>
            <div id="savedPostContainer"></div>
        </section>
    </main>
    
    <script>
        // Update star visual appearance based on rating
        function updateStars(rating) {
            document.querySelectorAll('.star-rating label').forEach(label => {
                const starValue = label.getAttribute('for').replace('star', '');
                if (parseInt(starValue) <= parseInt(rating)) {
                    label.style.color = 'gold';  // Filled stars
                } else {
                    label.style.color = 'gray';  // Empty stars
                }
            });
        }

        // Handle star rating selection and update selectedRating hidden field
        document.querySelectorAll('.star-rating input').forEach(radio => {
            radio.addEventListener('click', function () {
                const rating = this.value;
                document.getElementById('selectedRating').value = rating; // Update hidden input
                updateStars(rating); // Update star visuals
            });
        });

        // When the update modal opens, set the stars according to the current rating
        function openUpdateModal(postData) {
            const currentRating = postData.rating || 0;
            document.getElementById('selectedRating').value = currentRating; // Update hidden field with the rating
            updateStars(currentRating); // Set visual star ratings
        }

        // Example of opening the modal with a dummy post data
        openUpdateModal({ rating: 3 });
    </script>
    
    <script
        src="https://maps.googleapis.com/maps/api/js?key=[INSERTVALIDKEYHERE]&loading=async&libraries=maps,places&v=beta" defer>
    </script>
</body>
</html>
